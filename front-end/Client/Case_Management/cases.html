<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LexFlow – My Cases</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <aside class="sidebar">
    <button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">
      <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="logo">LexFlow</div>
    <nav>
      <a href="#">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
        <span>Consultations</span>
      </a>
      <a href="cases.html" class="active">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 8H3a2 2 0 00-2 2v9a2 2 0 002 2h18a2 2 0 002-2V10a2 2 0 00-2-2zM16 8V6a3 3 0 00-6 0v2M7 13v3m10-3v3"/></svg>
        <span>Cases</span>
      </a>
      <a href="#">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6M7 4H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2h-2M9 4a2 2 0 002 2h2a2 2 0 002-2M9 4a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        <span>Documents</span>
      </a>
      <a href="../Billing/billing.html">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span>Billing</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user user-btn" id="currentUserBtn">
        <div class="avatar" id="sidebarAvatar">JD</div>
        <div class="info">
          <div class="name" id="sidebarName">John Doe</div>
          <div class="role">User</div>
        </div>
        <button class="logout-btn" onclick="window.location.href='index.html'" style="width: auto; margin-left: auto;">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <main class="cases-main">
    <div class="top-bar">
      <div>
        <h1>My Cases</h1>
        <p>List of cases belonging only to the logged-in client.</p>
      </div>
      <button class="btn-new" id="btnNewConsultation">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        New Consultation
      </button>
    </div>

    <div class="search-bar">
      <span class="search-icon">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/></svg>
      </span>
      <input id="searchInput" type="text" placeholder="Search by CNR or case title" />
    </div>

    <!-- Dynamic case list container -->
    <div id="caseList"></div>

    <!-- No results message -->
    <div id="noResults" class="no-results" style="display:none;">
      <svg width="48" height="48" fill="none" stroke="#9ca3af" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/></svg>
      <p>No cases match your search.</p>
    </div>

    <div class="pagination">
      <div class="info" id="paginationInfo">Showing <strong>3</strong> of <strong>9</strong> cases</div>
      <div class="pages" id="paginationPages">
        <!-- dynamically generated -->
      </div>
    </div>
  </main>

  <script src="sidebar.js"></script>
  <script src="cases.js"></script>
</body>
</html>
