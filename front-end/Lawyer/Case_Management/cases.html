<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LexFlow – Law Firm Case List</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <aside class="sidebar">
    <button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">
      <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="logo">LexFlow</div>
    <nav>
      <a href="#">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        <span>Schedules</span>
      </a>
      <a href="cases.html" class="active">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 8H3a2 2 0 00-2 2v9a2 2 0 002 2h18a2 2 0 002-2V10a2 2 0 00-2-2zM16 8V6a3 3 0 00-6 0v2M7 13v3m10-3v3"/></svg>
        <span>Cases</span>
      </a>
      <a href="documents.html">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6M7 4H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2h-2M9 4a2 2 0 002 2h2a2 2 0 002-2M9 4a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        <span>Documents</span>
      </a>
      <a href="#">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span>Billing</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user user-btn" id="currentUserBtn">
        <div class="avatar" id="sidebarAvatar">SM</div>
        <div class="info">
          <div class="name" id="sidebarName">Sarah Mitchell</div>
          <div class="role">Firm Admin</div>
        </div>
        <button class="logout-btn" onclick="window.location.href='../../index.html'" style="width: auto; margin-left: auto;">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Changed structure slightly to match the screenshot better: A top bar above main -->
  <div style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
      <div class="topbar">
          <div class="breadcrumb">
              <span class="current">Cases</span>
          </div>
          <div style="display: flex; gap: 12px; align-items: center;">
              <button class="bell-btn" style="border:none; padding: 4px; background:#f3f4f6;">
                  <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/></svg>
              </button>
          </div>
      </div>
      
      <main class="cases-main" style="padding-top: 32px;">
        <div class="page-header" style="margin-bottom: 24px;">
          <h1>Case List</h1>
          <p>List of all cases under the law firm.</p>
        </div>

        <div class="search-bar" style="margin-bottom: 20px;">
          <span class="search-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/></svg>
          </span>
          <input id="searchInput" type="text" placeholder="Enter CNR to search cases" style="max-width: none;" />
        </div>

        <!-- Custom Tabs -->
        <div class="cases-tabs">
            <button class="tab-btn active" data-tab="all">All Cases</button>
            <button class="tab-btn" data-tab="pending">Pending Tasks <span class="tab-badge" id="pendingTasksCount">12</span></button>
            <div style="flex-grow: 1; border-bottom: 1px solid #e5e7eb;"></div>
            <div class="filter-wrapper" style="position: relative;">
                <button class="filter-btn" id="filterBtn">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
                    Filters
                </button>
                <div id="filterDropdown" style="display:none; position:absolute; background:#fff; border:1px solid #e5e7eb; border-radius:8px; padding:16px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.1); margin-top: 8px; right: 0; z-index: 100; min-width: 200px;">
                    <!-- Case Filters -->
                    <div id="caseFilterGroup">
                        <label style="font-size:12px; font-weight:700; color:#374151; display:flex; margin-bottom: 8px;">Filter by Status</label>
                        <select id="statusFilter" class="form-input" style="width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px;">
                            <option value="All">All</option>
                            <option value="Active">Active</option>
                            <option value="Ongoing">Ongoing</option>
                            <option value="Evidence Stage">Evidence Stage</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>

                    <!-- Task Filters (Hidden by default) -->
                    <div id="taskFilterGroup" style="display: none;">
                        <label style="font-size:12px; font-weight:700; color:#374151; display:flex; margin-bottom: 8px;">Filter by Priority</label>
                        <select id="taskPriorityFilter" class="form-input" style="width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px; margin-bottom: 12px;">
                            <option value="All">All Priorities</option>
                            <option value="HIGH">High</option>
                            <option value="MEDIUM">Medium</option>
                            <option value="LOW">Low</option>
                        </select>
                        <label style="font-size:12px; font-weight:700; color:#374151; display:flex; margin-bottom: 8px;">Filter by Status</label>
                        <select id="taskStatusFilter" class="form-input" style="width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px;">
                            <option value="All">All Statuses</option>
                            <option value="Pending">Pending</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dynamic case list container -->
        <div id="caseList" style="margin-top: 24px;"></div>

        <!-- No results message -->
        <div id="noResults" class="no-results" style="display:none; text-align: center; padding: 40px; color: #6b7280;">
          <svg width="48" height="48" fill="none" stroke="#9ca3af" viewBox="0 0 24 24" style="margin: 0 auto 16px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/></svg>
          <p>No cases match your search.</p>
        </div>

        <div class="pagination">
          <div class="info" id="paginationInfo">Showing <strong>1</strong> to <strong>4</strong> of <strong>24</strong> cases</div>
          <div class="pages" id="paginationPages">
            <!-- dynamically generated -->
          </div>
        </div>
      </main>
  </div>

  <script src="sidebar.js"></script>
  <script src="cases.js"></script>
</body>
</html>
