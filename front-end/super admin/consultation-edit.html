<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change consultation | Django site admin</title>
    <link rel="stylesheet" href="super-admin-global.css">
    <script src="../scripts/storageService.js"></script>
    <script src="../scripts/auth.js"></script>
    <script src="../scripts/superadmin-auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await StorageService.seed('../data/initialData.json');
            SuperAdminAuth.requireSuperAdmin();
        });
        function logoutSuperAdmin() {
            if (confirm('Are you sure you want to logout?')) SuperAdminAuth.logout();
        }
    </script>
</head>
<body class="change-form">

    <div id="container">

        <!-- Header -->
        <div id="header">
            <div id="branding">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style="margin-right: 8px;">
                    <rect width="24" height="24" rx="6" fill="rgba(255,255,255,0.15)"/>
                    <path d="M7 6h2v12H7V6zm4 4h2v8h-2v-8zm4-2h2v10h-2V8z" fill="#fff"/>
                </svg>
                <h1 id="site-name"><a href="index.html">LexFlow Super Admin</a></h1>
            </div>
            <div id="user-tools">
                WELCOME, <strong>SUPERADMIN</strong>. 
                <a href="../pages/landing_page.html">VIEW SITE</a> / 
                <a href="super-admin-login.html" onclick="logoutSuperAdmin(); return false;">LOG OUT</a>
            </div>
        </div>

        <!-- Breadcrumbs -->
        <div class="breadcrumbs">
            <a href="index.html">Home</a> &rsaquo; 
            <a href="#">LexFlow Platform</a> &rsaquo; 
            <a href="consultation-list.html">Consultations</a> &rsaquo; 
            Consultation Detail
        </div>

        <!-- Main Content -->
        <div id="content" class="colM">
            
            <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                <h1>Change consultation</h1>
                <ul class="object-tools">
                    <li><a href="#" class="addlink-btn" style="background:#ba2121;">History</a></li>
                    <li><a href="#" class="addlink-btn" style="background:#79aec8;">View on site ></a></li>
                </ul>
            </div>

            <!-- Form -->
            <form action="" method="post" id="firm_form">
                
                <div class="form-horizontal">
                    
                    <div class="form-row">
                        <div>
                            <label class="required" for="id_name">Client Name:</label>
                            <div class="field-box">
                                <input type="text" name="name" id="id_name" value="">
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div>
                            <label class="required" for="id_description">Status:</label>
                            <div class="field-box">
                                <input type="text" name="description" id="id_description" value="">
                                <span class="help">Enter status (e.g., upcoming, completed, cancelled)</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div>
                            <label for="id_reg_no">Date:</label>
                            <div class="field-box">
                                <input type="date" name="reg_no" id="id_reg_no" value="">
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Submit Bar -->
                <div class="submit-row">
                    <p class="deletelink-box"><a href="#" class="deletelink">Delete</a></p>
                    <input type="submit" value="Save and add another" class="btn-secondary" name="_addanother">
                    <input type="submit" value="Save and continue editing" class="btn-secondary" name="_continue">
                    <input type="submit" value="SAVE" class="btn-primary" name="_save">
                </div>

            </form>

        </div> <!-- /content -->

    </div> <!-- /container -->

        </div> <!-- /content -->

    </div> <!-- /container -->

    <script src="superadmin-storage.js"></script>
    <script src="superadmin.js"></script>
</body>
</html>
