<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LexFlow – Law Firm Case List</title>
<link rel="stylesheet" href="../styles/firm_manager_casemanagement_styles.css">
</head>
<body>
<aside class="sidebar">
<button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">
<span class="svg-icon-placeholder" data-icon="icon_1"></span>
</button>
<div class="logo">LexFlow</div>
<nav>
<a href="../index.html">
<span class="svg-icon-placeholder" data-icon="icon_26"></span>
<span>Schedules</span>
</a>
<a href="lawyer_casemanagement_cases.html" class="active">
<span class="svg-icon-placeholder" data-icon="icon_3"></span>
<span>Cases</span>
</a>

<a href="#">
<span class="svg-icon-placeholder" data-icon="icon_4"></span>
<span>Documents</span>
</a>
<a href="lawyer_casemanagement_billing.html">
<span class="svg-icon-placeholder" data-icon="icon_5"></span>
<span>Billing</span>
</a>
</nav>
<div class="sidebar-footer">
<div class="user user-btn" id="currentUserBtn">
<div class="avatar" id="sidebarAvatar">SM</div>
<div class="info">
<div class="name" id="sidebarName">Sarah Mitchell</div>
<div class="role">Lawyer</div>
</div>
<button class="logout-btn" onclick="window.location.href='../index.html'" style="width: auto; margin-left: auto;">
<span class="svg-icon-placeholder" data-icon="icon_6"></span>
</button>
</div>
</div>
</aside>
<div style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
<div class="topbar">
<div class="breadcrumb">
<span class="current">Cases</span>
</div>
<div style="display: flex; gap: 12px; align-items: center;">
<button class="bell-btn">
<span class="svg-icon-placeholder" data-icon="icon_33"></span>
</button>
</div>
</div>
<main class="cases-main" style="padding-top: 32px;">
<div class="page-header" style="margin-bottom: 24px;">
<h1>Case List</h1>
<p>List of all your assigned cases in the firm.</p>
</div>
<div class="search-bar">
<span class="search-icon">
<span class="svg-icon-placeholder" data-icon="icon_34"></span>
</span>
<input id="searchInput" type="text" placeholder="Enter CNR to search cases">
</div>
<div class="cases-tabs">
<button class="tab-btn active" data-tab="all">All Cases</button>
<button class="tab-btn" data-tab="pending">Pending Tasks <span class="tab-badge" id="pendingTasksCount">12</span></button>
<div style="flex-grow: 1; border-bottom: 1px solid #e5e7eb;"></div>
<div class="filter-wrapper" style="position: relative;">
<button class="filter-btn" id="filterBtn">
<span class="svg-icon-placeholder" data-icon="icon_35"></span>
Filters
</button>
<div id="filterDropdown" style="display:none; position:absolute; background:#fff; border:1px solid #e5e7eb; border-radius:8px; padding:16px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.1); margin-top: 8px; right: 0; z-index: 100; min-width: 200px;">
<div id="caseFilterGroup">
<label style="font-size:12px; font-weight:700; color:#374151; display:flex; margin-bottom: 8px;">Filter by Status</label>
<select id="statusFilter" class="form-input" style="width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px;">
<option value="All">All</option>
<option value="Active">Active</option>
<option value="Ongoing">Ongoing</option>
<option value="Evidence Stage">Evidence Stage</option>
<option value="Completed">Completed</option>
</select>
</div>
<div id="taskFilterGroup" style="display: none;">
<label style="font-size:12px; font-weight:700; color:#374151; display:flex; margin-bottom: 8px;">Filter by Priority</label>
<select id="taskPriorityFilter" class="form-input" style="width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px; margin-bottom: 12px;">
<option value="All">All Priorities</option>
<option value="HIGH">High</option>
<option value="MEDIUM">Medium</option>
<option value="LOW">Low</option>
</select>
<label style="font-size:12px; font-weight:700; color:#374151; display:flex; margin-bottom: 8px;">Filter by Status</label>
<select id="taskStatusFilter" class="form-input" style="width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px;">
<option value="All">All Statuses</option>
<option value="Pending">Pending</option>
<option value="Completed">Completed</option>
</select>
</div>
</div>
</div>
</div>
<div id="caseList" style="margin-top: 24px;"></div>
<div id="noResults" class="no-results" style="display:none; text-align: center; padding: 40px; color: #6b7280;">
<span class="svg-icon-placeholder" data-icon="icon_36"></span>
<p>No cases match your search.</p>
</div>
<div class="pagination">
<div class="info" id="paginationInfo">Showing <strong>1</strong> to <strong>4</strong> of <strong>24</strong> cases</div>
<div class="pages" id="paginationPages">
</div>
</div>
</main>
</div>
<script src="../scripts/lawyer_casemanagement_sidebar.js"></script>
<script src="../scripts/lawyer_casemanagement_cases.js"></script>
<script src="../assets/icons.js"></script>
</body>
</html>
