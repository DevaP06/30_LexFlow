<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Law Firm Sign-in — LexFlow</title>
  <link rel="stylesheet" href="../styles/global_devashish.css" />
  <link rel="stylesheet" href="../styles/signin.css" />
</head>
<body>
  <a class="logo" href="landing_page.html">LexFlow</a>

  <main class="page page-centered">
    <div class="card card-signin">
      <h1 class="card-heading">Sign-in</h1>

      <form action="#">
        <div class="form-field" style="margin-bottom:16px;">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="john@example.com" required />
        </div>

        <div class="form-field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="hello123" required />
        </div>

        <div class="btn-row">
          <button type="button" class="btn btn-ghost" onclick="location.href='#'">Cancel</button>
          <button type="submit" class="btn btn-primary">Sign In &rarr;</button>
        </div>
      </form>

      <p class="signup-note">
        Do not have a account ? Create One.<br>
        <a href="LawFirmOnboardingStep1.html">Sign Up</a>
      </p>
    </div>
  </main>
  <script src="../scripts/storageService.js"></script>
  <script src="../scripts/auth.js"></script>
  <script src="../scripts/signin.js"></script>
</body>
</html>
