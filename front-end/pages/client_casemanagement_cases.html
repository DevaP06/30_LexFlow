<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LexFlow – My Cases</title>
<link rel="stylesheet" href="../styles/client_casemanagement_styles.css">
</head>
<body>
<aside class="sidebar">
<button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">
<span class="svg-icon-placeholder" data-icon="icon_1"></span>
</button>
<div class="logo">LexFlow</div>
<nav>
<a href="#">
<span class="svg-icon-placeholder" data-icon="icon_2"></span>
<span>Consultations</span>
</a>
<a href="client_casemanagement_cases.html" class="active">
<span class="svg-icon-placeholder" data-icon="icon_3"></span>
<span>Cases</span>
</a>
<a href="#">
<span class="svg-icon-placeholder" data-icon="icon_4"></span>
<span>Documents</span>
</a>
<a href="client_billing.html">
<span class="svg-icon-placeholder" data-icon="icon_5"></span>
<span>Billing</span>
</a>
</nav>
<div class="sidebar-footer">
<div class="user user-btn" id="currentUserBtn">
<div class="avatar" id="sidebarAvatar">JD</div>
<div class="info">
<div class="name" id="sidebarName">John Doe</div>
<div class="role">User</div>
</div>
<button class="logout-btn" onclick="window.location.href='../index.html'" style="width: auto; margin-left: auto;">
<span class="svg-icon-placeholder" data-icon="icon_6"></span>
</button>
</div>
</div>
</aside>
<main class="cases-main">
<div class="top-bar">
<div>
<h1>My Cases</h1>
<p>List of cases belonging only to the logged-in client.</p>
</div>
<button class="btn-new" id="btnNewConsultation">
<span class="svg-icon-placeholder" data-icon="icon_24"></span>
New Consultation
</button>
</div>
<div class="search-bar">
<span class="search-icon">
<span class="svg-icon-placeholder" data-icon="icon_7"></span>
</span>
<input id="searchInput" type="text" placeholder="Search by CNR or case title">
</div>
<div id="caseList"></div>
<div id="noResults" class="no-results" style="display:none;">
<span class="svg-icon-placeholder" data-icon="icon_25"></span>
<p>No cases match your search.</p>
</div>
<div class="pagination">
<div class="info" id="paginationInfo">Showing <strong>3</strong> of <strong>9</strong> cases</div>
<div class="pages" id="paginationPages">
</div>
</div>
</main>
<script src="../scripts/client_casemanagement_sidebar.js"></script>
<script src="../scripts/client_casemanagement_cases.js"></script>
<script src="../assets/icons.js"></script>
</body>
</html>
