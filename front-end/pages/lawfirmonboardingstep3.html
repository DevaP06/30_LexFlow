<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Firm Admin Setup Step 3 — LexFlow</title>
  <link rel="stylesheet" href="../styles/global_devashish.css" />
  <link rel="stylesheet" href="../styles/lawfirm-onboard-step3.css" />
</head>
<body>
  <a class="logo" href="landing_page.html">LexFlow</a>

  <main class="page">
    <!-- Circular Stepper -->
    <div class="stepper-law">
      <div class="step-item done">
        <div class="step-num">1</div>
        <div class="step-text">Firm Info</div>
      </div>
      <div class="step-item done">
        <div class="step-num">2</div>
        <div class="step-text">Contact Info</div>
      </div>
      <div class="step-item active">
        <div class="step-num">3</div>
        <div class="step-text">Admin Setup</div>
      </div>
      <div class="stepper-line"></div>
    </div>

    <!-- Main Card -->
    <div class="card" style="max-width:760px; padding: 48px 60px;">
      <h1 class="card-heading" style="margin-bottom:8px; font-size: 26px;">Firm Admin Profile</h1>
      <p class="card-subtitle" style="margin-bottom:40px; font-size: 15px;">Set up the primary administrator for your law firm account. This person will have full access to manage the firm's settings.</p>

      <form action="firm-consultation-dashboard.html" novalidate>
        <!-- Profile Photo Section -->
        <div class="profile-photo-section">
          <label class="profile-photo-circle" style="cursor: pointer;">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="file" id="photo-upload" hidden onchange="console.log('Profile photo selected')" />
          </label>
          <div class="profile-photo-info">
            <p class="profile-photo-label">Profile Photo (Optional)</p>
            <p class="profile-photo-hint">JPG, GIF or PNG. Max size of 2MB.</p>
            <a href="#" class="profile-photo-upload-link" onclick="document.getElementById('photo-upload').click(); return false;">Upload Photo</a>
          </div>
        </div>

        <div class="form-grid-2" style="gap: 32px; margin-bottom: 24px;">
          <div class="form-field">
            <label for="admin-name">Admin Full Name</label>
            <input type="text" id="admin-name" placeholder="John Doe" required />
              <input type="text" id="admin-name" placeholder="Rahul Verma" required />
          </div>
          <div class="form-field">
            <label for="admin-email">Admin Email Address</label>
              <input type="email" id="admin-email" placeholder="rahul.verma@lawfirm.in" required />
          </div>
        </div>

        <div class="form-grid-2" style="gap: 32px; margin-bottom: 32px;">
          <div class="form-field">
            <label for="password">Password</label>
            <div class="input-icon-wrapper">
              <input type="password" id="password" placeholder="••••••••" style="padding-right: 44px;" required />
                <input type="password" id="password" placeholder="Create a strong password" style="padding-right: 44px;" required />
              <button type="button" class="input-icon toggle-password" data-target="password" style="right: 12px; left: auto; background: none; border: none; cursor: pointer;">
                <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="form-field">
            <label for="confirm-password">Confirm Password</label>
            <div class="input-icon-wrapper">
              <input type="password" id="confirm-password" placeholder="Re-enter your password" style="padding-right: 44px;" required />
              <button type="button" class="input-icon toggle-password" data-target="confirm-password" style="right: 12px; left: auto; background: none; border: none; cursor: pointer;">
                <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Terms Checkbox -->
        <div style="display: flex; gap: 12px; align-items: flex-start; margin-bottom: 40px;">
          <input type="checkbox" id="terms" style="width: 18px; height: 18px; cursor: pointer;" required />
          <label for="terms" style="font-weight: 400; color: #6B7280; font-size: 13px; line-height: 1.5; cursor: pointer;">
            I agree to the <a href="#" style="color: #6B7280; text-decoration: underline;">Terms of Service</a>, 
            <a href="#" style="color: #6B7280; text-decoration: underline;">Privacy Policy</a>, 
            and the firm management data processing agreement.
          </label>
        </div>

        <!-- Actions -->
        <div style="display: flex; gap: 16px;">
          <button type="button" class="btn btn-outline" onclick="location.href='Lawfirmonboardingstep2.html'" style="padding: 12px 32px; border-color: #E5E7EB; color: #374151;">Back</button>
          <button type="submit" class="btn btn-primary" style="flex: 1; padding: 12px; background: #223657;">Create Firm Account</button>
        </div>
      </form>
    </div>
  </main>
  <script>
    // Password visibility toggle logic
    document.querySelectorAll('.toggle-password').forEach(btn => {
      btn.addEventListener('click', () => {
        const inputId = btn.getAttribute('data-target');
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('svg');
        
        if (input.type === 'password') {
          input.type = 'text';
          // Update icon to closed eye (simplified representation)
          icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
        } else {
          input.type = 'password';
          // Restore open eye
          icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        }
      });
    });
  </script>
  <script src="../scripts/storageService.js"></script>
  <script src="../scripts/auth.js"></script>
  <script src="../scripts/lawfirm-onboarding.js"></script>
</body>
</html>
