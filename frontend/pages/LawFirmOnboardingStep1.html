<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Firm Registration Step 1 — LexFlow</title>
  <link rel="stylesheet" href="../styles/lexflow.css" />
  <link rel="stylesheet" href="../styles/lawfirm-onboarding-step1.css" />
</head>
<body>
  <a class="logo" href="LandingPage.html">LexFlow</a>

  <main class="page">
    <!-- Circular Stepper -->
    <div class="stepper-law">
      <div class="step-item active">
        <div class="step-num">1</div>
        <div class="step-text">Firm Info</div>
      </div>
      <div class="step-item">
        <div class="step-num">2</div>
        <div class="step-text">Contact Info</div>
      </div>
      <div class="step-item">
        <div class="step-num">3</div>
        <div class="step-text">Admin Setup</div>
      </div>
      <div class="stepper-line"></div>
    </div>

    <!-- Main Card -->
    <div class="card" style="max-width:720px;">
      <h1 class="card-heading" style="margin-bottom:4px;">Register Your Law Firm</h1>
      <p class="card-subtitle" style="margin-bottom:32px;">Start your digital transformation. Provide your firm's core details below.</p>

      <form action="Lawfirmonboardingstep2.html">
        <div class="form-grid-2">
          <div class="form-field">
            <label for="full-name">Full Name</label>
            <input type="text" id="full-name" placeholder="John Doe" required />
          </div>
          <div class="form-field">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="john@example.com" required />
          </div>
        </div>

        <div class="form-grid-2">
          <div class="form-field">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="+1 (555) 000-0000" required />
          </div>
          <div class="form-field">
            <label for="client-type">Client Type</label>
            <select id="client-type" required>
              <option value="individual">Individual</option>
              <option value="firm">Firm</option>
            </select>
          </div>
        </div>

        <div class="form-field" style="margin-bottom:16px;">
          <label for="street">Street Address</label>
          <input type="text" id="street" placeholder="123 Legal Way" required />
        </div>

        <div class="form-grid-3">
          <div class="form-field">
            <label for="city">City</label>
            <input type="text" id="city" placeholder="San Francisco" required />
          </div>
          <div class="form-field">
            <label for="state">State</label>
            <input type="text" id="state" placeholder="California" required />
          </div>
          <div class="form-field">
            <label for="zip">PIN / Zip Code</label>
            <input type="text" id="zip" placeholder="94105" required />
          </div>
        </div>

        <!-- Buttons row with Cancel and Continue -->
        <div class="btn-row btn-row-between" style="border-top:none; margin-top:32px; padding-top:0;">
          <button type="button" class="btn btn-ghost" onclick="location.href='LawFirm Sifgn In.html'" style="margin-left:auto; margin-right:24px;">Cancel</button>
          <button type="submit" class="btn btn-primary" style="padding: 12px 32px;">Continue &rarr;</button>
        </div>
      </form>

      <!-- Upload Zone below buttons as per Image 2 -->
      <div class="upload-zone" onclick="document.getElementById('logo-upload').click()" style="margin-top:24px; min-height:120px; border-style:dashed; border-color:#E5E7EB; background:#F8FAFC;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p class="upload-text" style="font-weight:600; color:#1e293b;">Upload Firm Logo</p>
        <span class="upload-hint" style="font-size:11px;">PNG, JPG up to 5MB (Preferred 1:1 ratio)</span>
        <input type="file" id="logo-upload" hidden />
      </div>

    </div>
  </main>
</body>
</html>
