<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Case Details — LexFlow</title>
  <meta name="description" content="Step 2 of 3: Provide your case details so LexFlow can match you with the right legal expert." />
  <link rel="stylesheet" href="../styles/global_devashish.css" />
  <link rel="stylesheet" href="../styles/client-onboard-step2.css" />
</head>
<body>
  <a class="logo" href="landing_page.html">LexFlow</a>

  <main class="page">
    <!-- Step indicator -->
    <nav class="stepper" aria-label="Onboarding steps">
      <div class="step">
        <div class="step-circle step-done" title="Completed">&#10003;</div>
        <span class="step-label">Profile</span>
      </div>
      <div class="step-line step-line-done"></div>
      <div class="step">
        <div class="step-circle step-active" aria-current="step">2</div>
        <span class="step-label">Case Details</span>
      </div>
    </nav>

    

    <!-- Page heading row with skip -->
    <div class="page-title-row">
      <div>
        <h1 class="page-heading">Tell us about your case</h1>
        <p class="page-subtitle">Provide the necessary details to help us match you with the right legal expert.</p>
      </div>
      <button type="button" class="btn btn-primary" onclick="location.href='client-consultation-dashboard.html'" style="flex-shrink:0;">Skip &rarr;</button>
    </div>

    <div id="case-alert" class="form-alert"></div>

    <form id="case-form" action="client-consultation-dashboard.html">

    <!-- Case details card -->
    <section class="section-card">
      <div class="form-grid-2">
        <div class="form-field">
          <label for="case-type">Case Type</label>
          <select id="case-type">
            <option value="" disabled selected>Select Case Category</option>
            <option value="civil">Civil</option>
            <option value="criminal">Criminal</option>
            <option value="family">Family</option>
            <option value="property">Property</option>
            <option value="corporate">Corporate</option>
          </select>
        </div>
        <div class="form-field">
          <label for="court-name">Court Name</label>
          <input type="text" id="court-name" placeholder="e.g. High Court of Mumbai" />
        </div>
        <div class="form-field col-span-2">
          <label for="cnr">CNR Number (Optional)</label>
          <input type="text" id="cnr" placeholder="Enter 16-digit CNR Number" maxlength="16" />
        </div>
        <div class="form-field col-span-2">
          <label for="description">Brief Description</label>
          <textarea id="description" placeholder="Briefly describe the nature of your legal matter..." rows="4"></textarea>
        </div>
      </div>
    </section>

    <!-- Preferred expertise card -->
    <section class="section-card">
      <p class="section-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="6"/><path d="M8.56 14.44L7 22l5-3 5 3-1.56-7.56"/>
        </svg>
        Preferred Lawyer Expertise
      </p>
      <div class="chips">
        <button class="chip selected" type="button">10+ Years</button>
        <button class="chip" type="button">Local Expert</button>
        <button class="chip" type="button">Female Lawyer</button>
        <button class="chip" type="button">Pro-Bono</button>
      </div>
    </section>

    <!-- Supporting documents card -->
    <section class="section-card">
      <div class="section-header">
        <h2 class="section-title">Supporting Documents</h2>
        <a class="skip-link" href="#" onclick="event.preventDefault()">Skip for now</a>
      </div>
      <div class="upload-grid">
        <div class="upload-item">
          <p class="upload-item-label">Identity Proof (Aadhar/Passport/DL)</p>
          <label class="upload-zone" for="upload-identity">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            <p class="upload-text">Drag and drop or <button type="button" class="upload-browse" onclick="document.getElementById('upload-identity').click()">Browse</button></p>
            <span class="upload-hint">PDF, JPG up to 5MB</span>
            <input type="file" id="upload-identity" accept=".pdf,.jpg,.jpeg" hidden />
          </label>
        </div>
        <div class="upload-item">
          <p class="upload-item-label">Case Related Documents</p>
          <label class="upload-zone" for="upload-case">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            <p class="upload-text">Drag and drop or <button type="button" class="upload-browse" onclick="document.getElementById('upload-case').click()">Browse</button></p>
            <span class="upload-hint">PDF, ZIP up to 20MB</span>
            <input type="file" id="upload-case" accept=".pdf,.zip" hidden onchange="console.log('Case file selected')" />
          </label>
        </div>
      </div>
    </section>

    <!-- Bottom actions -->
    <div class="bottom-row">
      <button type="button" class="btn btn-outline" onclick="location.href='Client Onboarding step1.html'">&larr; Back</button>
      <button type="submit" class="btn btn-primary">Submit Case Info &rarr;</button>
    </div>
    </form>
  </main>


</body>
</html>
