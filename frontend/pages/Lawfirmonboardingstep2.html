<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Firm Contact Info Step 2 — LexFlow</title>
  <link rel="stylesheet" href="../styles/global_devashish.css" />
  <link rel="stylesheet" href="../styles/lawfirm-onboard-step2.css" />
</head>
<body>
  <a class="logo" href="LandingPage.html">LexFlow</a>

  <main class="page">
    <!-- Circular Stepper -->
    <div class="stepper-law">
      <div class="step-item done">
        <div class="step-num">1</div>
        <div class="step-text">Firm Info</div>
      </div>
      <div class="step-item active">
        <div class="step-num">2</div>
        <div class="step-text">Contact Info</div>
      </div>
      <div class="step-item">
        <div class="step-num">3</div>
        <div class="step-text">Admin Setup</div>
      </div>
      <div class="stepper-line"></div>
    </div>

    <!-- Main Card -->
    <div class="card" style="max-width:720px;">
      <h1 class="card-heading" style="margin-bottom:4px;">Primary Contact Details</h1>
      <p class="card-subtitle" style="margin-bottom:32px;">Please provide the primary contact information for your firm's administrative operations.</p>

      <form action="lawfirmonboardingstep3.html">
        <div class="form-grid-2">
          <div class="form-field">
            <label for="primary-email">Primary Email <span style="color:#EF4444;">*</span></label>
            <div class="input-icon-wrapper">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
              <input type="email" id="primary-email" class="input-with-icon" placeholder="e.g. contact@firm.com" required />
            </div>
          </div>
          <div class="form-field">
            <label for="phone">Phone Number <span style="color:#EF4444;">*</span></label>
            <div class="input-icon-wrapper">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              </span>
              <input type="tel" id="phone" class="input-with-icon" placeholder="+1 (555) 000-0000" required />
            </div>
          </div>
        </div>

        <div class="form-field" style="margin-bottom:16px;">
          <label for="website">Website URL</label>
          <div class="input-icon-wrapper">
            <span class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            </span>
            <input type="url" id="website" class="input-with-icon" placeholder="https://www.yourfirm.com" />
          </div>
        </div>

        <div class="form-grid-2">
          <div class="form-field">
            <div style="display:flex; justify-content:space-between; align-items:flex-end;">
              <label for="secondary-email">Secondary Email</label>
              <span style="font-size:10px; color:#9CA3AF; font-weight:500; text-transform:uppercase;">Optional</span>
            </div>
            <div class="input-icon-wrapper">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/></svg>
              </span>
              <input type="email" id="secondary-email" class="input-with-icon" placeholder="billing@firm.com" />
            </div>
          </div>
          <div class="form-field">
            <div style="display:flex; justify-content:space-between; align-items:flex-end;">
              <label for="alt-phone">Additional Phone</label>
              <span style="font-size:10px; color:#9CA3AF; font-weight:500; text-transform:uppercase;">Optional</span>
            </div>
            <div class="input-icon-wrapper">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
              </span>
              <input type="tel" id="alt-phone" class="input-with-icon" placeholder="+1 (555) 111-2222" />
            </div>
          </div>
        </div>

        <div class="btn-row btn-row-between" style="border-top:none; margin-top:40px; padding-top:0;">
          <button type="button" class="btn btn-ghost" onclick="location.href='LawFirmOnboardingStep1.html'" style="display:flex; align-items:center; gap:8px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back
          </button>
          <button type="submit" class="btn btn-primary" style="padding: 12px 36px; display:flex; align-items:center; gap:8px;">
            Continue
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
