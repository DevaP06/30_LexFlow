<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Document Management</title>

    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- YOUR EXISTING CSS -->
    <link rel="stylesheet" href="../styles/sidebar.css">
</head>

<body>


    <!-- ============ SIDEBAR ============ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="sidebar-brand">
                <svg class="brand-icon" width="28" height="28" viewBox="0 0 24 24" fill="none">
                    <rect width="24" height="24" rx="6" fill="rgba(255,255,255,0.15)" />
                    <path d="M7 6h2v12H7V6zm4 4h2v8h-2v-8zm4-2h2v10h-2V8z" fill="#fff" />
                </svg>
                <span class="brand-text">LexFlow</span>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item" id="nav-consultations">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <span>Consultations</span>
                </a>
                <a href="#" class="nav-item" id="nav-cases">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span>Cases</span>
                </a>
                <a href="#" class="nav-item" id="nav-documents">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span>Documents</span>
                </a>
                <a href="#" class="nav-item" id="nav-billing">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="1" x2="12" y2="23"></line>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                    <span>Billing</span>
                </a>
                <a href="#" class="nav-item" id="nav-search">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <span>Find a Law Firm</span>
                </a>
                <a href="#" class="nav-item" id="nav-scheduling">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <!-- Back shadow page -->
                        <rect x="7" y="6" width="14" height="15" rx="1"></rect>
                        <!-- Main calendar body -->
                        <rect x="2" y="3" width="14" height="15" rx="1"></rect>
                        <!-- Calendar pins -->
                        <line x1="6" y1="1" x2="6" y2="5"></line>
                        <line x1="12" y1="1" x2="12" y2="5"></line>
                        <!-- Header divider -->
                        <line x1="2" y1="7" x2="16" y2="7"></line>
                        <!-- Row 1: checkbox + bar -->
                        <rect x="4" y="9.5" width="2.5" height="2.5"></rect>
                        <line x1="8.5" y1="10.75" x2="14.5" y2="10.75"></line>
                        <!-- Row 2: checkbox + bar -->
                        <rect x="4" y="13.5" width="2.5" height="2.5"></rect>
                        <line x1="8.5" y1="14.75" x2="14.5" y2="14.75"></line>
                    </svg>
                    <span>Schedules</span>
                </a>
            </nav>
        </div>

        <div class="sidebar-bottom">
            <div class="user-profile" id="user-profile">
                <div class="user-avatar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <div class="user-info">
                    <span class="user-name">John Doe</span>
                    <span class="user-role">User</span>
                </div>
                <button class="logout-btn" id="logout-btn" aria-label="Logout">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>
        </div>
    </aside>



</body>

</html>
